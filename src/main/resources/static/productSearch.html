<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DailyMart - Search</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

    <header>
        <div class="logo">DailyMart Admin</div>
        <nav>
            <a href="index.html" style="margin-right: 1.5rem; color: #10b981;">⬅ Storefront</a>
            <a href="admin.html">Dashboard</a>
            <a href="addProduct.html">Add Product</a>
            <a href="productListing.html">View Inventory</a>
            <a href="productSearch.html" class="active">Search</a>
        </nav>
    </header>

    <main class="animate-fade">
        <h1 class="page-title">Search Products</h1>
        
        <div class="card" style="display:flex; gap: 1rem; margin-bottom: 2rem;">
            <input type="text" id="searchInput" placeholder="Enter product name or category (e.g. Fresh, Apple)..." style="flex: 1;" onkeypress="if(event.key === 'Enter') handleSearch()">
            <button onclick="handleSearch()">Search</button>
        </div>

        <div class="product-grid" id="searchResults">
            <!-- Results rendered here -->
            <p style="grid-column: 1/-1; text-align: center; color: var(--text-secondary);">Enter a keyword above to search</p>
        </div>
    </main>

    <div id="notification"></div>

    <script>
        async function handleSearch() {
            const keyword = document.getElementById('searchInput').value.trim();
            if(!keyword) return;

            const container = document.getElementById('searchResults');
            container.innerHTML = '<p style="text-align:center; grid-column: 1/-1;">Searching...</p>';

            try {
                const res = await fetch(`/api/products/search?keyword=${encodeURIComponent(keyword)}`);
                const products = await res.json();
                
                if (products.length === 0) {
                    container.innerHTML = '<p style="text-align:center; grid-column: 1/-1;">No products matched your search.</p>';
                } else {
                    container.innerHTML = products.map(p => `
                        <div class="product-item">
                            <div class="badge ${p.category === 'Fresh' ? 'fresh' : ''}">${p.category}</div>
                            <h3 class="product-title">${p.name}</h3>
                            <p class="product-meta">Ref: ${p.id}</p>
                            <p><strong>Price:</strong> Rs ${p.price.toFixed(2)}</p>
                            <p><strong>Stock:</strong> ${p.stock} units</p>
                        </div>
                    `).join('');
                }
            } catch(e) {
                container.innerHTML = '<p style="text-align:center; color: var(--danger); grid-column: 1/-1;">Error connecting to backend API.</p>';
            }
        }
    </script>
</body>
</html>
