<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DailyMart - Add Product</title>
    <link rel="icon" type="image/x-icon" href="./assets/images/favicon.ico">
    <link rel="stylesheet" href="./assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="./assets/font/bootstrap-icons-1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --bg-deep: #0f172a;
            --bg-card: #1e293b;
            --accent-emerald: #10b981;
            --text-main: #f1f5f9;
            --text-muted: #cbd5e1;
        }
        body { 
            background-color: var(--bg-deep); 
            color: var(--text-main);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .navbar-premium {
            background: rgba(15, 23, 42, 0.8) !important;
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;
        }
        .form-card {
            background: var(--bg-card);
            padding: 2.5rem;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            margin-top: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .form-label { font-weight: 600; color: var(--text-muted); margin-bottom: 0.75rem; font-size: 0.9rem; }
        .form-control, .form-select {
            background: #0f172a !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            color: #ffffff !important;
            padding: 0.75rem 1rem;
            border-radius: 10px;
        }
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.4) !important;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--accent-emerald) !important;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }
        .btn-submit {
            background: var(--accent-emerald);
            border: none;
            padding: 0.85rem;
            border-radius: 10px;
            font-weight: 700;
            color: white;
            transition: all 0.2s;
        }
        .btn-submit:hover { background: #059669; transform: translateY(-2px); }
        .form-group { margin-bottom: 1.5rem; }
        /* High Contrast Overrides */
        h1, h2, h3, h4, h5, h6, .fw-bold { color: #ffffff !important; }
        .text-muted { color: var(--text-muted) !important; opacity: 1 !important; }

        /* Premium Toast Notifications */
        #notification {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 9999;
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            color: white;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #notification.show { transform: translateX(0); }
        #notification.success { background: #10b981; }
        #notification.error { background: #ef4444; }
        .notif-icon { font-size: 1.2rem; }
    </style>
</head>
<body>
    <!-- Premium Admin Navigation Bar -->
    <nav class="navbar navbar-expand-lg sticky-top navbar-premium py-3 mb-5">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2" href="admin.html">
                <!-- Cleaner branding without the large white box filter issue -->
                <i class="bi bi-shop text-success fs-3"></i>
                <span class="fw-bold text-white tracking-tight" style="font-size: 1.2rem;">DAILYMART <span class="text-success">ADMIN</span></span>
            </a>
            
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#adminNav">
                <i class="bi bi-list fs-2 text-white"></i>
            </button>

            <div class="collapse navbar-collapse" id="adminNav">
                <ul class="navbar-nav mx-auto gap-2">
                    <li class="nav-item">
                        <a class="nav-link px-3 py-2 rounded-pill fw-medium text-muted" href="admin.html">
                            <i class="bi bi-grid-1x2 me-2"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3 py-2 rounded-pill fw-medium text-muted" href="adminOrders.html">
                            <i class="bi bi-truck me-2"></i>Orders
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3 py-2 rounded-pill fw-medium text-muted" href="productListing.html">
                            <i class="bi bi-box-seam me-2"></i>Inventory
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3 py-2 rounded-pill fw-medium active" href="addProduct.html" style="background: rgba(16, 185, 129, 0.1); color: var(--accent-emerald);">
                            <i class="bi bi-plus-circle-fill me-2"></i>Add Product
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3 py-2 rounded-pill fw-medium text-muted" href="productSearch.html">
                            <i class="bi bi-search me-2"></i>Search
                        </a>
                    </li>
                </ul>
                <div class="d-flex align-items-center gap-4">
                    <a href="index.html" class="text-muted text-decoration-none d-flex align-items-center gap-1 border-bottom border-secondary" style="font-size: 0.9rem;">
                        <i class="bi bi-shop"></i> Storefront
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-xl-5">
                <h1 class="fw-bold mb-4">Add Product</h1>
                <div class="form-card">
                    <form id="addProductForm" onsubmit="submitForm(event)">
                        <div class="form-group">
                            <label class="form-label">Product Name</label>
                            <input type="text" id="name" class="form-control" required placeholder="Enter name">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Price (Rs.)</label>
                            <input type="number" step="0.01" id="price" class="form-control" required placeholder="0.00">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Product Image</label>
                            <input type="url" id="imageUrl" class="form-control" placeholder="Optional: Paste a link if you have one">
                            <small class="text-info d-block mt-2">
                                <i class="bi bi-magic me-1"></i> Leave empty to <strong>automatically generate</strong> a relevant picture!
                            </small>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Initial Stock</label>
                            <input type="number" id="stock" class="form-control" required placeholder="0">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Category</label>
                            <select id="category" class="form-select" onchange="toggleCategoryFields()" required>
                                <option value="" disabled selected>Select type...</option>
                                <option value="Fresh" data-type="Fresh">Fresh (By Weight)</option>
                                <option value="Packaged" data-type="Packaged">Packaged (Single Unit)</option>
                            </select>
                        </div>
                        <div class="form-group" id="freshField" style="display: none;">
                            <label class="form-label">Weight (kg)</label>
                            <input type="number" step="0.01" id="weight" class="form-control" placeholder="0.00">
                        </div>
                        <div class="form-group" id="packagedField" style="display: none;">
                            <label class="form-label">Expiry Date</label>
                            <input type="date" id="expiry" class="form-control">
                        </div>
                        <button type="submit" class="btn-submit w-100 mt-3">Register Product</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div id="notification"></div>

    <script>
        // Security check
        if (localStorage.getItem('adminLoggedIn') !== 'true') {
            window.location.href = 'admin-login.html';
        }

        function toggleCategoryFields() {
            const select = document.getElementById('category');
            const selectedOption = select.options[select.selectedIndex];
            const type = selectedOption ? selectedOption.getAttribute('data-type') : '';
            
            document.getElementById('freshField').style.display = (type === 'Fresh') ? 'block' : 'none';
            document.getElementById('packagedField').style.display = (type === 'Packaged') ? 'block' : 'none';
        }

        async function submitForm(e) {
            e.preventDefault();
            
            const btn = e.target.querySelector('button');
            const select = document.getElementById('category');
            const selectedOption = select.options[select.selectedIndex];
            const type = selectedOption.getAttribute('data-type');
            const categoryValue = select.value;

            const originalText = btn.innerText;
            btn.innerText = 'Adding...';
            btn.disabled = true;

            const endpoint = type === 'Fresh' ? '/api/products/fresh' : '/api/products/packaged';

            const payload = {
                name: document.getElementById('name').value,
                category: categoryValue,
                price: parseFloat(document.getElementById('price').value),
                stock: parseInt(document.getElementById('stock').value),
                imageUrl: document.getElementById('imageUrl').value.trim()
            };

            if (type === 'Fresh') {
                payload.weight = parseFloat(document.getElementById('weight').value);
            } else {
                payload.expiryDate = document.getElementById('expiry').value;
            }

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    showNotification('Product added successfully!');
                    document.getElementById('addProductForm').reset();
                    toggleCategoryFields();
                } else {
                    const err = await response.text();
                    showNotification('Error: ' + err, true);
                }
            } catch (err) {
                showNotification('Network error. Is server running?', true);
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        function showNotification(msg, isError = false) {
            const notif = document.getElementById('notification');
            const icon = isError ? 'bi-exclamation-triangle-fill' : 'bi-check-circle-fill';
            
            notif.innerHTML = `<i class="bi ${icon} notif-icon"></i> <span>${msg}</span>`;
            notif.className = isError ? 'error show' : 'success show';
            
            setTimeout(() => { 
                notif.classList.remove('show');
            }, 4000);
        }
    </script>
    <script src="./assets/js/bootstrap.bundle.min.js"></script>
</body>
</html>
